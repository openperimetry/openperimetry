name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Gitleaks (secret scan)
        run: |
          set -euo pipefail
          VERSION="8.21.2"
          TMP_DIR="$(mktemp -d)"
          curl -sSL "https://github.com/zricethezav/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" -o "${TMP_DIR}/gitleaks.tgz"
          tar -xzf "${TMP_DIR}/gitleaks.tgz" -C "${TMP_DIR}"
          "${TMP_DIR}/gitleaks" version
          "${TMP_DIR}/gitleaks" detect --redact -v --exit-code=2 --log-level=info --log-opts=-1

  dependency_review:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v5

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high severity)
        run: npm audit --audit-level=high || true

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_APP_NAME: Visual Field Check
          VITE_APP_URL: http://127.0.0.1:5174
          VITE_SHOW_ABOUT_PAGE: "true"
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        timeout-minutes: 20
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high severity)
        run: npm audit --audit-level=high || true

      - name: Type check
        run: npx tsc -p tsconfig.json --noEmit

      - name: Build
        run: npm run build
